<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em chưa tày đâu v4.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        /* Cập nhật màu sắc: Dark mode sử dụng màu đen tuyệt đối #000000 */
        :root { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: #f1f5f9; --sub-card: #f1f5f9; }
        .dark { --bg: #000000; --card: #121212; --text: #f8fafc; --border: #262626; --sub-card: #1a1a1a; }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); transition: background-color 0.3s, color 0.3s; }
        .card-ui { background-color: var(--card); border: 1px solid var(--border); }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .option-btn { transition: all 0.2s; border: 2px solid var(--border); background: var(--card); cursor: pointer; position: relative; }
        .option-btn:hover { transform: translateY(-1px); border-color: #4f46e5; }
        .option-btn.selected { border-color: #4f46e5; background: #eef2ff; }
        .dark .option-btn.selected { background: #1e1b4b; border-color: #6366f1; }

        .label-box { background: var(--sub-card); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-weight: 800; }
        
        .sidebar { transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar.open { transform: translateX(0); }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .tf-btn.active-đúng { background-color: #10b981; color: white; border-color: #10b981; }
        .tf-btn.active-sai { background-color: #ef4444; color: white; border-color: #ef4444; }

        .dark textarea, .dark input[type="text"] { background-color: #0a0a0a !important; color: white; }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden">
    <!-- NAVBAR & MENU BUTTON -->
    <div class="fixed top-6 right-6 z-50 flex space-x-2">
        <button onclick="toggleDarkMode()" class="p-3 card-ui rounded-2xl shadow-lg hover:scale-110 transition-transform">
            <svg id="sun-icon" class="w-6 h-6 text-yellow-500 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
            <svg id="moon-icon" class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
        <button onclick="toggleSidebar()" class="p-3 card-ui rounded-2xl shadow-lg hover:scale-110 transition-transform">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
        </button>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar fixed top-0 right-0 h-full w-80 z-[60] card-ui shadow-2xl p-8 overflow-y-auto custom-scrollbar">
        <div class="flex justify-between items-center mb-8">
            <h3 class="text-xl font-black uppercase tracking-tighter">Menu</h3>
            <button onclick="toggleSidebar()" class="text-slate-400 hover:text-red-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        
        <div class="space-y-6">
            <section>
                <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Lịch sử luyện tập</h4>
                <div id="history-list" class="space-y-2 max-h-64 overflow-y-auto pr-2 custom-scrollbar text-xs">
                    <p class="text-slate-400 italic">Chưa có dữ liệu...</p>
                </div>
                <button onclick="clearHistory()" class="mt-2 text-[10px] text-red-400 font-bold hover:underline">Xóa lịch sử</button>
            </section>

            <section>
                <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Cài đặt</h4>
                <div class="flex items-center justify-between text-sm">
                    <span>Âm thanh phản hồi</span>
                    <input type="checkbox" id="sound-toggle" checked class="w-4 h-4 rounded accent-indigo-600">
                </div>
            </section>

            <section class="pt-6 border-t border-slate-100 dark:border-zinc-800">
                <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Nhà phát hành</h4>
                <div class="p-4 bg-slate-50 dark:bg-zinc-900 rounded-2xl border border-transparent dark:border-zinc-800">
                    <p class="font-bold text-sm">Hoàng Hải</p>
                    <p class="text-xs text-slate-400 mt-1">Version 4.6)</p>
                    <p class="text-xs italic text-indigo-500 mt-2">"cái gì khó thì mình tự làm:V"</p>
                </div>
            </section>
        </div>
    </div>
    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[55] hidden transition-all"></div>

    <div id="app" class="max-w-3xl mx-auto px-4 py-12">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-indigo-600 tracking-tighter uppercase">EM CHƯA TÀY ĐÂU</h1>
            <p class="text-slate-400 mt-2 font-bold text-sm tracking-wide italic underline decoration-indigo-200">PURE BLACK v5.1</p>
        </header>

        <!-- SETUP SCREEN -->
        <div id="setup-screen" class="card-ui p-8 rounded-[2rem] shadow-xl fade-in">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-extrabold">Soạn đề bài</h2>
                <label class="cursor-pointer bg-slate-100 dark:bg-zinc-900 text-slate-500 px-4 py-2 rounded-xl text-sm font-bold flex items-center transition-all border dark:border-zinc-800">
                    Nhập .docx <input type="file" id="file-upload" accept=".docx" class="hidden" onchange="handleFileUpload(event)">
                </label>
            </div>
            <textarea id="raw-input" class="w-full h-80 p-6 bg-slate-50 dark:bg-black border-2 border-slate-100 dark:border-zinc-800 rounded-3xl focus:ring-4 focus:ring-indigo-50 dark:focus:ring-indigo-900/20 focus:border-indigo-400 outline-none transition-all mb-4 font-mono text-sm custom-scrollbar" placeholder="Dán nội dung từ AI hoặc file Word vào đây..."></textarea>
            <div class="flex justify-between items-center">
                <div class="flex flex-col">
                    <span id="question-count" class="text-sm font-black text-slate-400 uppercase tracking-widest">0 câu hỏi</span>
                    <label class="flex items-center mt-2 cursor-pointer group">
                        <input type="checkbox" id="shuffle-toggle" checked class="w-4 h-4 text-indigo-600 rounded accent-indigo-600">
                        <span class="ml-2 text-xs font-bold text-slate-500 group-hover:text-indigo-600">Xáo trộn câu hỏi & đáp án</span>
                    </label>
                </div>
                <button onclick="startQuiz()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-4 rounded-2xl font-black transition-all shadow-lg active:scale-95 uppercase tracking-tight">Bắt đầu học</button>
            </div>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quiz-screen" class="hidden card-ui p-10 rounded-[2.5rem] shadow-2xl fade-in">
            <div class="flex items-center space-x-4 mb-10">
                <div class="flex-1 h-3 bg-slate-100 dark:bg-zinc-900 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-500" style="width: 0%"></div>
                </div>
                <span id="progress-text" class="text-sm font-black text-indigo-600">1/1</span>
            </div>
            <div id="question-container" class="min-h-[350px]">
                <div id="question-display" class="mb-10 text-2xl font-extrabold leading-tight"></div>
                <div id="answer-area" class="w-full space-y-4"></div>
                <div id="feedback-area" class="hidden mt-8 p-6 rounded-3xl border-l-[6px] fade-in">
                    <div id="feedback-status" class="font-black text-2xl mb-1 italic tracking-tighter"></div>
                    <div id="correct-display" class="font-bold text-lg opacity-90"></div>
                </div>
            </div>
            <div class="flex justify-between items-center mt-12 pt-8 border-t border-slate-100 dark:border-zinc-800">
                <button onclick="goBackToSetup()" class="bg-slate-100 dark:bg-zinc-900 text-slate-500 px-6 py-4 rounded-2xl font-bold hover:bg-slate-200 dark:hover:bg-zinc-800 transition-colors">Thoát</button>
                <div class="flex items-center space-x-4">
                    <button id="btn-action" onclick="handleButtonClick()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-12 py-4 rounded-2xl font-black shadow-xl active:scale-95 transition-all min-w-[200px]">Kiểm tra (Enter)</button>
                </div>
            </div>
        </div>

        <!-- RESULT SCREEN -->
        <div id="result-screen" class="hidden card-ui p-12 rounded-[3rem] shadow-2xl text-center fade-in">
            <div id="score-circle" class="mx-auto w-40 h-40 rounded-full border-[10px] border-indigo-500 flex items-center justify-center text-5xl font-black text-indigo-600 mb-8 bg-indigo-50 dark:bg-zinc-900 shadow-inner">0/0</div>
            <h2 class="text-3xl font-black mb-8">Hoàn thành bài luyện tập!</h2>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button onclick="restartQuiz()" class="bg-indigo-600 text-white px-10 py-5 rounded-2xl font-black shadow-lg shadow-indigo-100">Luyện lại đề này</button>
                <button onclick="goBackToSetup()" class="bg-slate-100 dark:bg-zinc-900 text-slate-700 dark:text-slate-300 px-10 py-5 rounded-2xl font-black hover:bg-slate-200 dark:hover:bg-zinc-800">Soạn đề khác</button>
            </div>
        </div>
    </div>

    <script>
        let questions = []; 
        let currentIndex = 0; 
        let score = 0; 
        let isWaitingForNext = false; 
        let userResponses = [];
        let currentTFRow = 0;

        const STORAGE_KEY = 'em_chua_tay_dau_input';
        const THEME_KEY = 'em_chua_tay_dau_theme';
        const HISTORY_KEY = 'em_chua_tay_dau_history';

        window.onload = () => { 
            const saved = localStorage.getItem(STORAGE_KEY); 
            if (saved) { document.getElementById('raw-input').value = saved; updateCount(); } 
            
            if (localStorage.getItem(THEME_KEY) === 'dark') toggleDarkMode(true);
            renderHistory();
        };

        function toggleDarkMode(forceDark = false) {
            const isCurrentlyDark = document.body.classList.contains('dark');
            const shouldBeDark = forceDark || !isCurrentlyDark;
            
            if (shouldBeDark) {
                document.body.classList.add('dark');
                localStorage.setItem(THEME_KEY, 'dark');
                document.getElementById('sun-icon').classList.remove('hidden');
                document.getElementById('moon-icon').classList.add('hidden');
            } else {
                document.body.classList.remove('dark');
                localStorage.setItem(THEME_KEY, 'light');
                document.getElementById('sun-icon').classList.add('hidden');
                document.getElementById('moon-icon').classList.remove('hidden');
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('hidden');
            if(sidebar.classList.contains('open')) renderHistory();
        }

        function updateCount() {
            const val = document.getElementById('raw-input').value;
            const count = val.split(';').filter(l => l.trim().includes('||')).length;
            document.getElementById('question-count').innerText = `${count} câu hỏi`;
            localStorage.setItem(STORAGE_KEY, val);
        }
        document.getElementById('raw-input').addEventListener('input', updateCount);

        async function handleFileUpload(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                try { 
                    const result = await mammoth.extractRawText({ arrayBuffer: e.target.result }); 
                    document.getElementById('raw-input').value = result.value; 
                    updateCount(); 
                } catch (err) { alert("Lỗi đọc file .docx"); }
            };
            reader.readAsArrayBuffer(file);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function parseQuestions(text) {
            let parsed = text.split(';').map(b => b.trim()).filter(b => b.includes('||')).map(block => {
                if (block.startsWith('[TN]')) {
                    const p = block.replace('[TN]', '').split('||').map(s => s.trim());
                    return { type: 'mcq', q: p[0], options: p[1].split('|').map(o => o.trim()), a: p[2] };
                } else if (block.startsWith('[DS]')) {
                    const lines = block.replace('[DS]', '').trim().split('\n').map(l => l.trim()).filter(l => l.length > 0);
                    const subItems = lines.slice(1).map(line => {
                        const sp = line.split('||').map(s => s.trim());
                        return { text: sp[0].replace(/^-/, '').trim(), ans: (sp[1]?.startsWith('Đ') || sp[1]?.startsWith('D')) ? 'đúng' : 'sai' };
                    });
                    return { type: 'tf_multi', q: lines[0], subQs: subItems, a: subItems.map(s => s.ans).join('|') };
                } else if (block.startsWith('[TLN]')) {
                    const p = block.replace('[TLN]', '').split('||').map(s => s.trim());
                    return { type: 'number', q: p[0], a: p[1].replace(/\s/g, '') };
                } else {
                    const prefix = block.substring(0, 4);
                    const p = block.substring(4).split('||').map(s => s.trim());
                    return { type: 'write', q: p[0], a: p[1] };
                }
            });

            if (document.getElementById('shuffle-toggle').checked) {
                parsed = shuffleArray(parsed);
                parsed.forEach(item => {
                    if (item.type === 'mcq') item.options = shuffleArray(item.options);
                    if (item.type === 'tf_multi') item.subQs = shuffleArray(item.subQs);
                });
            }
            return parsed;
        }

        function startQuiz() {
            questions = parseQuestions(document.getElementById('raw-input').value);
            if (questions.length === 0) return alert("Cấu trúc đề không hợp lệ!");
            currentIndex = 0; score = 0;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            isWaitingForNext = false; userResponses = []; currentTFRow = 0;
            const item = questions[currentIndex];
            const area = document.getElementById('answer-area');
            document.getElementById('feedback-area').classList.add('hidden');
            document.getElementById('btn-action').innerText = "Kiểm tra (Enter)";
            document.getElementById('progress-text').innerText = `${currentIndex + 1}/${questions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / questions.length) * 100}%`;
            document.getElementById('question-display').innerText = item.q;
            area.innerHTML = "";

            if (item.type === 'mcq') {
                item.options.forEach((opt, idx) => {
                    const b = document.createElement('div');
                    b.className = "option-btn p-5 rounded-2xl flex items-center space-x-4";
                    b.id = `opt-${idx}`;
                    b.innerHTML = `
                        <div class="label-box">${String.fromCharCode(65+idx)}</div> 
                        <span class="font-bold text-slate-700 dark:text-zinc-200">${opt}</span>
                        <span class="absolute right-4 top-4 text-[10px] opacity-20 font-black">${idx+1}</span>
                    `;
                    b.onclick = () => selectMCQ(idx, opt);
                    area.appendChild(b);
                });
            } else if (item.type === 'tf_multi') {
                item.subQs.forEach((sub, idx) => {
                    const row = document.createElement('div');
                    row.className = `bg-slate-50 dark:bg-zinc-900/50 p-5 rounded-2xl border-2 border-slate-100 dark:border-zinc-800 flex flex-col sm:flex-row justify-between items-center transition-all ${idx === 0 ? 'ring-2 ring-indigo-100 dark:ring-indigo-900/40 border-indigo-200 dark:border-indigo-800' : ''}`;
                    row.id = `tf-row-${idx}`;
                    row.innerHTML = `<div class="font-bold text-slate-700 dark:text-zinc-200 flex-1 pr-4">${idx+1}. ${sub.text}</div>
                        <div class="flex space-x-2 mt-4 sm:mt-0" id="row-btns-${idx}">
                            <button class="tf-btn px-6 py-2 rounded-xl border-2 border-slate-200 dark:border-zinc-700 font-bold text-xs" id="tf-${idx}-đúng" onclick="selectTF(${idx}, 'đúng')">Đúng (1)</button>
                            <button class="tf-btn px-6 py-2 rounded-xl border-2 border-slate-200 dark:border-zinc-700 font-bold text-xs" id="tf-${idx}-sai" onclick="selectTF(${idx}, 'sai')">Sai (2)</button>
                        </div>`;
                    area.appendChild(row);
                });
            } else if (item.type === 'number') {
                const c = document.createElement('div'); c.className = "flex justify-center flex-wrap gap-2 py-6";
                for (let i = 0; i < Math.max(item.a.length, 4); i++) {
                    const input = document.createElement('input'); input.type = "text"; input.maxLength = 1;
                    input.className = "w-14 h-20 text-center text-4xl font-black border-4 border-slate-100 dark:border-zinc-800 dark:bg-black rounded-2xl outline-none focus:border-indigo-400";
                    input.id = `num-${i}`; input.oninput = (e) => { if (e.target.value && i < Math.max(item.a.length, 4) - 1) document.getElementById(`num-${i+1}`).focus(); };
                    c.appendChild(input);
                }
                area.appendChild(c); setTimeout(() => document.getElementById('num-0')?.focus(), 100);
            } else {
                area.innerHTML = `<textarea id="ans-input" class="w-full p-6 bg-slate-50 dark:bg-black border-4 border-slate-100 dark:border-zinc-800 rounded-[2rem] text-xl font-bold outline-none h-32 focus:border-indigo-200" placeholder="Nhập câu trả lời..."></textarea>`;
                setTimeout(() => document.getElementById('ans-input')?.focus(), 100);
            }
        }

        function selectMCQ(idx, val) {
            document.querySelectorAll('.option-btn').forEach(el => el.classList.remove('selected'));
            document.getElementById(`opt-${idx}`).classList.add('selected');
            userResponses = [val];
        }

        function selectTF(idx, val) {
            const row = document.getElementById(`row-btns-${idx}`);
            row.querySelectorAll('.tf-btn').forEach(btn => btn.classList.remove('active-đúng', 'active-sai'));
            document.getElementById(`tf-${idx}-${val}`).classList.add('active-' + val);
            userResponses[idx] = val;
            
            if (idx === currentTFRow && idx < questions[currentIndex].subQs.length - 1) {
                document.getElementById(`tf-row-${currentTFRow}`).classList.remove('ring-2', 'ring-indigo-100', 'dark:ring-indigo-900/40', 'border-indigo-200', 'dark:border-indigo-800');
                currentTFRow++;
                document.getElementById(`tf-row-${currentTFRow}`).classList.add('ring-2', 'ring-indigo-100', 'dark:ring-indigo-900/40', 'border-indigo-200', 'dark:border-indigo-800');
            }
        }

        function handleButtonClick() { if (isWaitingForNext) nextQuestion(); else handleSubmit(); }

        function handleSubmit() {
            const item = questions[currentIndex]; let isCorrect = false; let displayCorrect = "";
            
            if (item.type === 'mcq') {
                if (!userResponses[0]) return;
                isCorrect = userResponses[0].toLowerCase() === item.a.toLowerCase();
                displayCorrect = `Đáp án: ${item.a}`;
            } else if (item.type === 'tf_multi') {
                if (userResponses.length < item.subQs.length) return;
                const correctArr = item.a.split('|');
                isCorrect = userResponses.every((v, i) => v === correctArr[i]);
                displayCorrect = `Đáp án: ${item.a.toUpperCase()}`;
            } else if (item.type === 'number') {
                let uNum = ""; for(let i=0; i<Math.max(item.a.length, 4); i++) uNum += document.getElementById(`num-${i}`).value;
                isCorrect = uNum === item.a; displayCorrect = `Số đúng: ${item.a}`;
            } else {
                const uText = document.getElementById('ans-input').value.trim().toLowerCase();
                isCorrect = uText === item.a.toLowerCase(); displayCorrect = `Đáp án: ${item.a}`;
            }

            isWaitingForNext = true;
            const status = document.getElementById('feedback-status'); 
            const box = document.getElementById('feedback-area');
            box.classList.remove('hidden');
            if (isCorrect) {
                score++; status.innerText = "CHÍNH XÁC!"; status.className = "font-black text-2xl mb-1 text-emerald-600 italic";
                box.className = "mt-8 p-6 rounded-3xl border-l-[6px] border-emerald-500 bg-emerald-50 dark:bg-emerald-950/20 fade-in";
                document.getElementById('correct-display').innerText = "Tuyệt vời!";
            } else {
                status.innerText = "CHƯA ĐÚNG!"; status.className = "font-black text-2xl mb-1 text-red-600 italic";
                box.className = "mt-8 p-6 rounded-3xl border-l-[6px] border-red-500 bg-red-50 dark:bg-red-950/20 fade-in";
                document.getElementById('correct-display').innerText = displayCorrect;
            }
            document.getElementById('btn-action').innerText = "Tiếp theo (Enter)";
        }

        function nextQuestion() { currentIndex++; if (currentIndex < questions.length) renderQuestion(); else finishQuiz(); }
        
        function finishQuiz() { 
            document.getElementById('quiz-screen').classList.add('hidden'); 
            document.getElementById('result-screen').classList.remove('hidden'); 
            document.getElementById('score-circle').innerText = `${score}/${questions.length}`; 
            saveToHistory(score, questions.length);
        }

        function saveToHistory(s, total) {
            let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
            history.unshift({
                date: new Date().toLocaleString('vi-VN'),
                score: s,
                total: total,
                percent: Math.round((s/total)*100)
            });
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, 20)));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
            if(history.length === 0) {
                list.innerHTML = '<p class="text-slate-400 italic">Chưa có dữ liệu...</p>';
                return;
            }
            list.innerHTML = history.map(item => `
                <div class="p-3 bg-slate-50 dark:bg-zinc-900 rounded-xl flex justify-between items-center border border-slate-100 dark:border-zinc-800">
                    <div>
                        <div class="font-bold">${item.score}/${item.total} (${item.percent}%)</div>
                        <div class="text-[9px] text-slate-400">${item.date}</div>
                    </div>
                </div>
            `).join('');
        }

        function clearHistory() {
            localStorage.removeItem(HISTORY_KEY);
            renderHistory();
        }

        function goBackToSetup() { document.getElementById('setup-screen').classList.remove('hidden'); document.getElementById('quiz-screen').classList.add('hidden'); document.getElementById('result-screen').classList.add('hidden'); }
        function restartQuiz() { startQuiz(); }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('quiz-screen').classList.contains('hidden')) return;
            if (e.key === 'Enter') {
                if (document.activeElement.tagName !== 'TEXTAREA') handleButtonClick();
                return;
            }
            if (['1', '2', '3', '4'].includes(e.key) && !isWaitingForNext) {
                const item = questions[currentIndex];
                const idx = parseInt(e.key) - 1;
                if (item.type === 'mcq' && item.options[idx]) selectMCQ(idx, item.options[idx]);
                else if (item.type === 'tf_multi') {
                    if (e.key === '1') selectTF(currentTFRow, 'đúng');
                    if (e.key === '2') selectTF(currentTFRow, 'sai');
                }
            }
        });
    </script>
</body>
</html>
